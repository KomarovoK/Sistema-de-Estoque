<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Editar Item</title>
</head>

<body>

    {% with mensagens = get_flashed_messages(with_categories=true) %}
        {% if mensagens %}
            {% for categoria, mensagem in mensagens %}
                <p class="{{ categoria }}">{{ mensagem }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <h1>Editar Item</h1>

    <div class="topo" style="margin-top: 120px;">

        <form method="POST">

            <p>
                <strong>Produto:</strong>
                {{ item[1] }} - R$ {{ item[2] }} - Estoque: {{ item[3] }}
            </p>

            <br>

            <input
                style="padding: 8px; border-radius: 5px; width: 230px;"
                type="number"
                name="quantidade"
                placeholder="Nova quantidade"
                min="1"
                required
            >

            <br><br>    

            <button type="submit" class="btn adicionar">Salvar alterações</button>

            <a href="/pedido_cliente/{{ cliente_id }}" class="btn voltar">Voltar</a>

        </form>

    </div>

</body>
</html>
