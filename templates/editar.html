<!DOCTYPE html>
<html lang="pt-br">

<head>
    
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1>Editar Produto</h1>

    <form method="POST">

        <input
            style="padding: 8px; border-radius: 5px;"
            type="text"
            name="nome"
            value="{{ produto[1] }}"
            required
        >

        <br><br>

        <input
            style="padding: 8px; border-radius: 5px;"
            type="number"
            step="0.01"
            name="preco"
            value="{{ produto[2] }}"
            required
        >

        <br><br>

        <input
            style="padding: 8px; border-radius: 5px;"
            type="number"
            name="quantidade"
            value="{{ produto[3] }}"
            required
        >

        <br><br>

        <button type="submit" class="btn salvar">
            Salvar
        </button>
        <a href="/" class="btn voltar">
            Voltar
        </a>

    </form>

</body>
</html>
