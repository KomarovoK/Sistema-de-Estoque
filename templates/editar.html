<!DOCTYPE html>
<html lang="pt-br">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Editar Produto</title>
    
    
</head>

<body>

    <h1>Editar Produto</h1>
    
    {% with mensagens = get_flashed_messages() %}
        {% if mensagens %}
            {% for mensagem in mensagens %}
                <p class="{{ categoria }}">{{ mensagem }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="topo" style="margin-top: 120px;">

        <form method="POST">

            <input
                style="padding: 8px; border-radius: 5px;"
                type="text"
                name="nome"
                value="{{ produto[1] }}"
                required
            >

            <br><br>

            <input
                style="padding: 8px; border-radius: 5px;"
                type="number"
            step="0.01"
                name="preco"
                value="{{ produto[2] }}"
                required
            >

            <br><br>

            <input
                style="padding: 8px; border-radius: 5px;"
                type="number"
                name="quantidade"
                value="{{ produto[3] }}"
                required
            >

            <br><br>

            <button type="submit" class="btn adicionar">Salvar</button>
        
            <a href="/" class="btn voltar">Voltar</a>

        </form>
        
    </div>

</body>

</html>
